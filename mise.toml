[tools]
swift = "6.2"

[env]
SCORE_EDITOR = "zed"

# Dev Server
[tasks.dev]
description = "Start the development server with hot reload"
raw = true
usage = '''
flag "-p --port <port>" help="Port for the dev server" default="8080"
'''
run = '''
swift run score dev --port "$usage_port"
'''

# Build
[tasks.build]
description = "Build the site for production"
sources = ["Sources/**/*.swift", "Package.swift"]
usage = '''
flag "-v --verbose" help="Show verbose build output" default="false"
'''
run = '''
swift run ${usage_verbose:+-v} score build
'''

# Format & Lint
[tasks.format]
description = "Format or lint source code"
sources = ["Sources/**/*.swift"]
usage = '''
flag "--check" help="Lint instead of format" default="false"
'''
run = '''
if [ "${usage_check?}" = "true" ]; then
  swift format lint --recursive --strict Sources
else
  swift format --recursive -i Sources
fi
'''

# Continuous Integration
[tasks.ci]
description = "Run all CI gates"
depends = [
  "format",
  "format --check",
  "build",
]
run = "echo CI completed successfully"

# Hooks
[tasks.setup-hooks]
description = "Install pre-commit hook"
run = '''
HOOK_PATH="$(git rev-parse --git-path hooks/pre-commit)"
printf "%s\n" \
  "#!/usr/bin/env sh" \
  "set -eu" \
  "ROOT=$(git rev-parse --show-toplevel)" \
  "cd \"$ROOT\"" \
  "echo \"[pre-commit] Running mise run ci...\"" \
  "mise run ci" > "$HOOK_PATH"
chmod +x "$HOOK_PATH"
echo "Installed pre-commit hook at $HOOK_PATH"
'''

# Clean
[tasks.clean]
description = "Remove build artifacts"
run = '''
swift package clean
rm -rf .score
'''
